<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Triiiceratops Web Component Demo</title>
        <link rel="stylesheet" href="app.css" />
        <link rel="stylesheet" href="../../dist/triiiceratops-element.css" />

        <script src="../../dist/triiiceratops-element.iife.js"></script>
        <script src="../../dist/triiiceratops-plugin-image-manipulation.iife.js"></script>
        <script src="../../dist/triiiceratops-plugin-annotation-editor.iife.js"></script>
        <script src="../../dist/triiiceratops-plugin-pdf-export.iife.js"></script>
    </head>
    <body>
        <triiiceratops-viewer
            theme="dark"
            manifest-id="https://iiif.wellcomecollection.org/presentation/v3/b18035723"
            canvas-id="https://iiif.wellcomecollection.org/presentation/b18035723/canvases/b18035723_0001.JP2"
        ></triiiceratops-viewer>

        <script>
            customElements.whenDefined('triiiceratops-viewer').then(() => {
                const viewer = document.querySelector('triiiceratops-viewer');
                const plugins = window.TriiiceratopsPlugins;

                if (!viewer || !plugins) {
                    return;
                }

                viewer.plugins = [
                    plugins.ImageManipulation,
                    plugins.AnnotationEditor,
                    plugins.PdfExport,
                ];
            });
        </script>
    </body>
</html>
